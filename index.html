<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLF // ARCHIVE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Stage 3: Surveillance Layer -->
    <canvas id="surveillance-layer"></canvas>



    <!-- Stage 2 & 4: The Linear Labyrinth -->
    <main id="labyrinth">
        <!-- Stage 1: The Threshold (Now integrated into scroll) -->
        <section class="gallery-section bg-white" id="threshold" data-bg="white">
            <div class="monolith">
                <div class="monolith-text" id="monolith-text">
                    <div class="monolith-line-1">OLF</div>
                    <div class="monolith-line-2">Protocole d'effacement</div>
                </div>
            </div>
        </section>

        <!-- Artwork 1 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/1zyZxvKm/Group.jpg" alt="GROUP" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_GROUP // 2026</div>
        </section>

        <!-- Artwork 2 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/7LqyvKN3/Reflet.png" alt="REFLET" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_REFLET // 2026</div>
        </section>

        <!-- Artwork 3 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/5tfMcsmj/blocked.png" alt="BLOCKED" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_BLOCKED // 2026</div>
        </section>

        <!-- Artwork 4 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/Dz7KVxcg/debout.jpg" alt="DEBOUT" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_DEBOUT // 2026</div>
        </section>

        <!-- Artwork 5 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/QMjrLfqt/eyes-of-the-city-olf.png" alt="EYES OF THE CITY" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_EYES_OF_THE_CITY // 2026</div>
        </section>

        <!-- Artwork 6 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/zfpYqTdK/la-pelote.jpg" alt="LA PELOTE" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_LA_PELOTE // 2026</div>
        </section>

        <!-- Artwork 7 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/3w3HMtZG/the-door.jpg" alt="THE DOOR" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_THE_DOOR // 2026</div>
        </section>

        <!-- Artwork 8 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/NMMqFLSq/the-reach.jpg" alt="THE REACH" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_THE_REACH // 2026</div>
        </section>

        <!-- Artwork 9 -->
        <section class="gallery-section bg-white" data-bg="white">
            <div class="artwork-container">
                <img src="https://i.postimg.cc/nzzbrMgf/under-the-bridge-signe.jpg" alt="UNDER THE BRIDGE" class="artwork-image">
            </div>
            <div class="metadata color-black">ID_OLF_UNDER_THE_BRIDGE // 2026</div>
        </section>

        <!-- Artwork 10 -->

            </div>
            <div class="metadata color-black">ID_OLF_WALKIN_ON_THE_RIGHT_SIDE // 2026</div>
        </section>

        <!-- Stage 4: The Archive (Black) -->
        <section class="gallery-section bg-black" id="archive" data-bg="black">
            <div class="form-container">
                <form id="contact-form">
                    <input type="text" placeholder="[INPUT: IDENTITY]" required class="brutalist-input">
                    <textarea placeholder="[INPUT: MESSAGE]" required class="brutalist-input brutalist-textarea"></textarea>
                    <button type="submit" class="brutalist-button">[EXECUTE]</button>
                </form>
            </div>
            <div class="monogram color-white">OLF</div>
        </section>
    </main>

    <script src="script.js"></script>

</html>
