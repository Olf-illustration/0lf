        <!-- Stage 4: The Archive (Black) -->
       <section id="archive-contact" style="
    width: 100vw; 
    height: 100vh; 
    background-color: #000000; 
    color: #ffffff; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    position: relative;
    scroll-snap-align: start;
    box-sizing: border-box;
    padding: 40px;
">

    <form action="https://formsubmit.co/olf.illustration@gmail.com" method="POST" style="
        width: 100%; 
        max-width: 500px; 
        display: flex; 
        flex-direction: column; 
        gap: 30px;
    ">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://olf-illustration.github.io/0lf/">

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; color: #666666;">[INPUT: IDENTITY]</label>
            <input type="text" name="name" required style="
                background: transparent; 
                border: none; 
                border-bottom: 1px solid #ffffff; 
                color: #ffffff; 
                font-family: 'Space Mono', monospace; 
                font-size: 16px; 
                padding: 10px 0; 
                outline: none;
            ">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; color: #666666;">[INPUT: EMAIL_ADDRESS]</label>
            <input type="email" name="email" required style="
                background: transparent; 
                border: none; 
                border-bottom: 1px solid #ffffff; 
                color: #ffffff; 
                font-family: 'Space Mono', monospace; 
                font-size: 16px; 
                padding: 10px 0; 
                outline: none;
            ">
        </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <label style="font-family: 'Space Mono', monospace; font-size: 12px; text-transform: uppercase; color: #666666;">[INPUT: MESSAGE]</label>
            <textarea name="message" rows="4" required style="
                background: transparent; 
                border: 1px solid #ffffff; 
                color: #ffffff; 
                font-family: 'Space Mono', monospace; 
                font-size: 16px; 
                padding: 15px; 
                outline: none; 
                resize: none;
            "></textarea>
        </div>

        <button type="submit" style="
            background: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 15px; 
            font-family: 'Space Mono', monospace; 
            font-size: 14px; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: crosshair;
            transition: background 0.1s;
        " onmouseover="this.style.background='#666666'; this.style.color='#ffffff';" onmouseout="this.style.background='#ffffff'; this.style.color='#000000';">
            SUBMIT_PROTOCOL
        </button>
    </form>

    <div style="
        position: absolute; 
        bottom: 40px; 
        right: 40px; 
        border: 2px solid #ffffff; 
        padding: 10px 15px; 
        font-family: 'Space Mono', monospace; 
        font-weight: bold; 
        font-size: 18px; 
        letter-spacing: 2px;
    ">
        OLF
    </div>
</section>
